<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Footprint Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ========== PAGE WRAPPER ========== -->
  <div class="page">

    <!-- ========== HEADER ========== -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-leaf">🌿</span>
          <span class="logo-text">EcoTrace</span>
        </div>
        <div class="header-meta">
          <span id="currentMonth" class="month-label"></span>
          <button class="btn-reset" id="btnReset">Reset month</button>
        </div>
      </div>
    </header>

    <!-- ========== MAIN ========== -->
    <main class="main">

      <!-- Hero total card -->
      <section class="hero-card" aria-label="Monthly total emissions">
        <div class="hero-left">
          <p class="hero-label">total this month</p>
          <div class="hero-number">
            <span id="heroTotal">0</span>
            <span class="hero-unit">kg CO₂e</span>
          </div>
          <div class="goal-track">
            <div class="goal-bar">
              <div class="goal-fill" id="goalFill"></div>
            </div>
            <div class="goal-labels">
              <span>0</span>
              <span id="goalPct">0% of 800 kg goal</span>
              <span>800</span>
            </div>
          </div>
        </div>
        <div class="hero-right">
          <p class="vs-label">vs. avg person</p>
          <p class="vs-number" id="vsAvg">—</p>
          <p class="vs-sub" id="vsSubtext">Log an entry to compare</p>
        </div>
      </section>

      <!-- Category grid -->
      <section class="section" aria-label="Emission categories">
        <h2 class="section-title">Categories</h2>
        <div class="cat-grid" id="catGrid">
          <!-- Injected by JS -->
        </div>
      </section>

      <!-- Logging panel (shown when category selected) -->
      <section class="log-panel" id="logPanel" aria-label="Log activity" hidden>
        <div class="log-panel-inner">
          <div class="log-panel-header">
            <h3 class="log-panel-title" id="logPanelTitle">Log activity</h3>
            <button class="btn-close" id="btnClosePanel" aria-label="Close">✕</button>
          </div>
          <div class="log-inputs" id="logInputs">
            <!-- Injected by JS -->
          </div>
          <div class="log-actions">
            <button class="btn-secondary" id="btnCancel">Cancel</button>
            <button class="btn-primary" id="btnAdd">Add entry</button>
          </div>
        </div>
      </section>

      <!-- Recent entries -->
      <section class="section" aria-label="Recent entries">
        <h2 class="section-title">Recent entries</h2>
        <div class="entries-list" id="entriesList">
          <p class="empty-state">No entries yet — select a category above to start logging.</p>
        </div>
      </section>

      <!-- Tips -->
      <section class="tips-section" aria-label="Eco tips">
        <h2 class="tips-title">Quick wins 🌱</h2>
        <ul class="tips-list" id="tipsList">
          <!-- Injected by JS -->
        </ul>
      </section>

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="site-footer">
      <p>Emission factors are research-based estimates. EcoTrace &copy; 2025</p>
    </footer>

  </div><!-- /page -->

  <script src="app.js"></script>
</body>
</html>
