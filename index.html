<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carbon Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <h1>🌱 Carbon Footprint Tracker</h1>
  <p class="subtitle">Track • Analyze • Improve</p>

  <div class="card">
    <label>⚡ Electricity (kWh / month)</label>
    <input type="number" id="electricity">

    <label>Car Travel (miles / month)</label>
    <input type="number" id="car">

    <label>Flights (hours / year)</label>
    <input type="number" id="flights">

    <button onclick="addEntry()">Add Entry</button>
  </div>

  <div class="result-card">
    <h2>Latest Result</h2>
    <p id="result">No data yet</p>
    <p id="comparison"></p>
  </div>

  <div class="card">
    <h2>Your Trend</h2>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h2>History</h2>
    <ul id="history"></ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
